name: clawmate
description: "SSH Terminal App for remote development with Claude Code"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dartssh2: ^2.17.1
  xterm: ^4.0.0
  flutter_secure_storage: ^10.3.1
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  nsd: ^5.0.1
  wakelock_plus: ^1.2.8
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
